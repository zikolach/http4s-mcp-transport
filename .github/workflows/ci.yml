name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        env:
          GIT_CONFIG_COUNT: '1'
          GIT_CONFIG_KEY_0: init.defaultBranch
          GIT_CONFIG_VALUE_0: main
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: sbt/setup-sbt@v1
      - name: Validate
        run: sbt "scalafmtCheckAll; +compile; +transport / Test / testOnly io.github.http4smcp.Http4sStreamableServerTransportProviderSuite; simpleServer/compile"
