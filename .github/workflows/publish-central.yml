name: Publish Maven Central

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish, for example 0.1.0 or 0.1.0-SNAPSHOT'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-maven-central:
    name: Publish to Maven Central
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        env:
          GIT_CONFIG_COUNT: '1'
          GIT_CONFIG_KEY_0: init.defaultBranch
          GIT_CONFIG_VALUE_0: main
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Cache Scala and sbt dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/coursier
            ~/.ivy2/cache
            ~/.sbt
          key: ${{ runner.os }}-sbt-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', '.scalafmt.conf') }}
          restore-keys: |
            ${{ runner.os }}-sbt-

      - name: Validate build
        run: sbt "scalafmtCheckAll; +compile; +transport / Test / testOnly io.github.http4smcp.Http4sStreamableServerTransportProviderSuite; simpleServer/compile"

      - name: Import PGP signing key
        env:
          PGP_SECRET: ${{ secrets.MILL_PGP_SECRET_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${PGP_SECRET:-}" ]; then
            echo "PGP_SECRET is required for Maven Central signing." >&2
            exit 2
          fi
          printf '%s' "$PGP_SECRET" | base64 --decode | gpg --batch --import
          gpg --batch --list-secret-keys --with-colons | grep -q '^sec'

      - name: Publish packages to Maven Central
        env:
          SONATYPE_USERNAME: ${{ secrets.MILL_SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.MILL_SONATYPE_PASSWORD }}
          PGP_SECRET: ${{ secrets.MILL_PGP_SECRET_BASE64 }}
          PGP_PASSPHRASE: ${{ secrets.MILL_PGP_PASSPHRASE }}
          HTTP4S_MCP_TRANSPORT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          version="${HTTP4S_MCP_TRANSPORT_VERSION:-}"
          if [ -z "$version" ] && [ "${GITHUB_REF_NAME#v}" != "$GITHUB_REF_NAME" ]; then
            version="${GITHUB_REF_NAME#v}"
          fi
          if [ -z "$version" ]; then
            echo "Version is required. Use a v* tag or workflow_dispatch input." >&2
            exit 2
          fi

          echo "Publishing http4s-mcp-transport ${version} to Maven Central"
          if [[ "$version" == *-SNAPSHOT ]]; then
            HTTP4S_MCP_TRANSPORT_VERSION="$version" sbt "+publishSigned"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            HTTP4S_MCP_TRANSPORT_VERSION="$version" CI_RELEASE="+publishSigned" sbt ci-release
          else
            echo "Stable releases must run from a v* tag so sbt-ci-release can publish." >&2
            echo "Push tag v${version} or rerun this workflow from that tag." >&2
            exit 2
          fi

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          changelog_notes="$(
            awk -v version="$version" '
              $0 ~ "^## \[" version "\]" { in_section = 1; print; next }
              in_section && /^## \[/ { exit }
              in_section { print }
            ' CHANGELOG.md
          )"
          if [ -z "$changelog_notes" ]; then
            changelog_notes="No changelog section found for ${GITHUB_REF_NAME}."
          fi
          notes=$(cat <<EOF
          ${changelog_notes}

          Published to Maven Central.

          ## sbt

          \`\`\`scala
          libraryDependencies += "io.github.zikolach" %% "http4s-mcp-transport" % "${version}"
          \`\`\`

          ## Maven coordinates

          - \`io.github.zikolach:http4s-mcp-transport_2.13:${version}\`
          - \`io.github.zikolach:http4s-mcp-transport_3:${version}\`
          EOF
          )
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --notes "$notes"
          else
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --notes "$notes"
          fi
